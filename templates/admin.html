<script>
  function filterTable(tableId, query, colIndex) {
    const q = query.toLowerCase();
    document.querySelectorAll(`#${tableId} tbody tr`).forEach(row => {
      const cell = row.cells[colIndex];
      row.style.display = cell && cell.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  }
  function filterDriveStatus(value) {
    document.querySelectorAll('#tbl-drives tbody tr').forEach(row => {
      row.style.display = (value === 'all' || row.dataset.status === value) ? '' : 'none';
    });
  }
</script>
